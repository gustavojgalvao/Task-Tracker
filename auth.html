<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>VitaAscend — Autenticação de Operador</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-dark": "#05070a",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] }
                },
            },
        }
    </script>

    <style>
        .auth-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(13, 89, 242, 0.1) 0%, transparent 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .tab-active {
            color: #fff;
            position: relative;
        }

        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d59f2;
            box-shadow: 0 0 10px #0d59f2;
        }

        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">

    <div class="relative min-h-screen w-full flex items-center justify-center p-6 auth-gradient">

        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute top-[-10%] left-[-10%] size-[500px] bg-primary/10 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-[-10%] right-[-10%] size-[400px] bg-blue-600/5 blur-[100px] rounded-full"></div>
        </div>

        <div
            class="w-full max-w-[450px] glass-card rounded-[2.5rem] p-8 md:p-12 shadow-2xl animate-fade-in relative z-10">

            <div class="flex flex-col items-center mb-10">
                <a href="index.html" class="flex items-center gap-3 text-primary group">
                    <div
                        class="size-12 rounded-2xl bg-primary/20 flex items-center justify-center border border-primary/30 group-hover:scale-110 group-hover:rotate-3 transition-all duration-500 shadow-[0_0_20px_rgba(13,89,242,0.2)]">
                        <span class="material-symbols-outlined font-bold text-2xl">change_history</span>
                    </div>
                    <span class="text-3xl font-black tracking-tighter text-white uppercase italic">VitaAscend</span>
                </a>
                <p
                    class="text-slate-500 text-[10px] font-black uppercase tracking-[0.4em] mt-6 flex items-center gap-2">
                    <span class="h-px w-4 bg-slate-800"></span> Terminal de Acesso <span
                        class="h-px w-4 bg-slate-800"></span>
                </p>
            </div>

            <div id="auth-error"
                class="hidden mb-8 p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-[11px] font-bold items-start gap-3 animate-fade-in">
                <span class="material-symbols-outlined text-lg">terminal</span>
                <div class="flex-1 space-y-1">
                    <p class="uppercase tracking-widest text-[9px] opacity-60">System Alert</p>
                    <span id="error-message" class="leading-relaxed"></span>
                </div>
            </div>

            <div
                class="flex gap-8 mb-10 border-b border-white/5 text-[11px] font-black uppercase tracking-[0.2em] text-slate-500">
                <button id="tab-login" onclick="switchTab('login')"
                    class="pb-4 transition-all tab-active">Entrar</button>
                <button id="tab-signup" onclick="switchTab('signup')"
                    class="pb-4 transition-all hover:text-white">Cadastrar</button>
            </div>

            <div id="panel-login" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Identificador
                        (Email)</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 text-xl">alternate_email</span>
                        <input type="email" id="login-email" placeholder="nome@exemplo.com"
                            class="w-full bg-white/5 border border-white/5 rounded-2xl py-4 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-primary focus:bg-white/[0.08] transition-all outline-none">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Código de
                        Chave</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 text-xl">lock</span>
                        <input type="password" id="login-password" placeholder="••••••••"
                            class="w-full bg-white/5 border border-white/5 rounded-2xl py-4 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-primary focus:bg-white/[0.08] transition-all outline-none">
                    </div>
                </div>
                <button id="btn-login" onclick="handleLogin()"
                    class="w-full py-5 bg-primary text-white font-black rounded-2xl shadow-xl shadow-primary/30 hover:scale-[1.02] active:scale-[0.98] transition-all uppercase tracking-[0.2em] text-[11px] mt-4">
                    Acessar Unidade
                </button>
            </div>

            <div id="panel-signup" class="hidden space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Codinome</label>
                    <input type="text" id="signup-name" placeholder="Como quer ser identificado?"
                        class="w-full bg-white/5 border border-white/5 rounded-2xl py-4 px-5 text-sm font-medium focus:ring-2 focus:ring-primary focus:bg-white/[0.08] transition-all outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Email de
                        Operação</label>
                    <input type="email" id="signup-email" placeholder="seu@email.com"
                        class="w-full bg-white/5 border border-white/5 rounded-2xl py-4 px-5 text-sm font-medium focus:ring-2 focus:ring-primary focus:bg-white/[0.08] transition-all outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Nova
                        Senha</label>
                    <input type="password" id="signup-password" placeholder="Mínimo 6 caracteres"
                        class="w-full bg-white/5 border border-white/5 rounded-2xl py-4 px-5 text-sm font-medium focus:ring-2 focus:ring-primary focus:bg-white/[0.08] transition-all outline-none">
                </div>
                <button id="btn-signup" onclick="handleSignup()"
                    class="w-full py-5 bg-primary text-white font-black rounded-2xl shadow-xl shadow-primary/30 hover:scale-[1.02] active:scale-[0.98] transition-all uppercase tracking-[0.2em] text-[11px] mt-4">
                    Iniciar Protocolo Ascend
                </button>
            </div>

            <div class="mt-10">
                <div class="flex items-center gap-4 mb-8">
                    <div class="h-px flex-1 bg-white/5"></div>
                    <span class="text-[9px] font-black uppercase text-slate-600 tracking-[0.3em]">Terceiros</span>
                    <div class="h-px flex-1 bg-white/5"></div>
                </div>
                <button onclick="handleGoogle()"
                    class="w-full py-4 bg-white/[0.03] hover:bg-white/[0.08] border border-white/10 rounded-2xl flex items-center justify-center gap-3 transition-all group">
                    <svg class="size-5 transition-transform group-hover:scale-110" viewBox="0 0 24 24">
                        <path fill="#fff"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#fff" opacity="0.6"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#fff" opacity="0.4"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#fff" opacity="0.6"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span class="text-xs font-black uppercase tracking-widest text-slate-300">Google Account</span>
                </button>
            </div>

            <div class="mt-10 text-center">
                <a href="index.html"
                    class="inline-flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] text-slate-600 hover:text-primary transition-all">
                    <span class="material-symbols-outlined text-sm">west</span> Abortar Autenticação
                </a>
            </div>
        </div>
    </div>

    <nav
        class="md:hidden fixed bottom-6 left-6 right-6 h-[72px] bg-background-dark/80 backdrop-blur-xl border border-white/10 flex justify-around items-center px-4 z-[100] shadow-2xl rounded-3xl">
        <a href="index.html" class="flex flex-col items-center gap-1 text-slate-500">
            <span class="material-symbols-outlined font-bold text-2xl">home</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Início</span>
        </a>
        <a href="index.html#features" class="flex flex-col items-center gap-1 text-slate-500">
            <span class="material-symbols-outlined font-bold text-2xl">bolt</span>
            <span class="text-[8px] font-black uppercase tracking-widest">SaaS</span>
        </a>
        <a href="auth.html" class="flex flex-col items-center gap-1 text-primary">
            <span class="material-symbols-outlined font-bold text-2xl">login</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Acesso</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/utils.js"></script>

    <script>
        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('panel-login').classList.toggle('hidden', !isLogin);
            document.getElementById('panel-signup').classList.toggle('hidden', isLogin);

            document.getElementById('tab-login').classList.toggle('tab-active', isLogin);
            document.getElementById('tab-login').classList.toggle('text-slate-500', !isLogin);

            document.getElementById('tab-signup').classList.toggle('tab-active', !isLogin);
            document.getElementById('tab-signup').classList.toggle('text-slate-500', isLogin);

            clearError();
        }

        const urlTab = new URLSearchParams(location.search).get('tab');
        if (urlTab === 'signup') switchTab('signup');

        function showError(msg) {
            const el = document.getElementById('auth-error');
            const msgEl = document.getElementById('error-message');
            msgEl.textContent = msg;
            el.classList.remove('hidden');
            el.classList.add('flex');
        }

        function clearError() {
            document.getElementById('auth-error').classList.add('hidden');
            document.getElementById('auth-error').classList.remove('flex');
        }

        function translateError(err) {
            const msg = err.message || '';
            if (msg.includes('Invalid login credentials')) return 'Credenciais de acesso negadas pelo sistema.';
            if (msg.includes('Email not confirmed')) return 'Confirmação pendente. Verifique sua caixa de entrada.';
            if (msg.includes('User already registered')) return 'Este identificador já consta em nossa base de dados.';
            if (msg.includes('Password should be')) return 'Complexidade insuficiente. Use ao menos 6 caracteres.';
            if (msg.includes('rate limit')) return 'Múltiplas tentativas detectadas. Acesso bloqueado por segurança.';
            return msg || 'Falha crítica na sincronização de acesso.';
        }

        async function handleLogin() {
            clearError();
            const btn = document.getElementById('btn-login');
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) { showError('Identificador e Chave são obrigatórios.'); return; }

            btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Validando...`;
            btn.disabled = true;

            try {
                await Auth.signIn(email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showError(translateError(err));
                btn.innerHTML = `Acessar Unidade`;
                btn.disabled = false;
            }
        }

        async function handleSignup() {
            clearError();
            const btn = document.getElementById('btn-signup');
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            if (!email || !password) { showError('Email e Chave são obrigatórios para o registro.'); return; }
            if (password.length < 6) { showError('Segurança da Chave insuficiente.'); return; }

            btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Registrando...`;
            btn.disabled = true;

            try {
                await Auth.signUp(email, password, name);
                await Auth.signIn(email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showError(translateError(err));
                btn.innerHTML = `Iniciar Protocolo Ascend`;
                btn.disabled = false;
            }
        }

        async function handleGoogle() {
            clearError();
            try {
                await Auth.signInWithGoogle();
            } catch (err) {
                showError(translateError(err));
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const isLogin = !document.getElementById('panel-login').classList.contains('hidden');
                if (isLogin) handleLogin(); else handleSignup();
            }
        });

        Router.init();
    </script>
</body>

</html>
